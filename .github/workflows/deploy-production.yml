name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 40m
          script_stop: true
          script: |
            set -xeuo pipefail
            cd /var/www/portfolio
            TARGET_SHA="${{ github.sha }}"
            echo "Target SHA: $TARGET_SHA"
            echo "HOSTNAME: $(hostname)"
            echo "WHOAMI: $(whoami)"
            echo "PWD: $(pwd)"
            echo "Before deploy SHA: $(git rev-parse --short HEAD)"

            git fetch --prune origin main
            git checkout main
            git reset --hard "$TARGET_SHA"
            git clean -fd
            echo "After reset SHA: $(git rev-parse --short HEAD)"

            pkill -f "next build" || true
            rm -f .next/lock
            pnpm install --no-frozen-lockfile
            export NODE_OPTIONS=--max-old-space-size=2048
            printf "%s" "$TARGET_SHA" > public/.deploy-sha
            pnpm build --webpack
            test -f .next/BUILD_ID

            if pm2 describe portfolio >/dev/null 2>&1; then
              pm2 restart portfolio --update-env
            else
              pm2 start "pnpm start -p 3000" --name portfolio
            fi

            pm2 save
            curl -fsS http://127.0.0.1:3000 >/dev/null
            LOCAL_SHA="$(curl -fsS http://127.0.0.1:3000/.deploy-sha | tr -d '\r\n')"
            echo "Local served SHA: $LOCAL_SHA"
            test "$LOCAL_SHA" = "$TARGET_SHA"
            DEPLOYED_SHA="$(git rev-parse HEAD)"
            echo "Deployed SHA: $DEPLOYED_SHA"
            test "$DEPLOYED_SHA" = "$TARGET_SHA"
