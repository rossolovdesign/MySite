name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 40m
          script_stop: true
          script: |
            set -xeuo pipefail
            cd /var/www/portfolio
            TARGET_SHA="${{ github.sha }}"
            EXPECTED_HOST_IP="${{ secrets.PROD_HOST }}"
            echo "Target SHA: $TARGET_SHA"
            echo "HOSTNAME: $(hostname)"
            echo "WHOAMI: $(whoami)"
            echo "PWD: $(pwd)"
            CURRENT_PUBLIC_IP="$(curl -4 -fsS https://api.ipify.org)"
            echo "Remote public IP: $CURRENT_PUBLIC_IP"
            test "$CURRENT_PUBLIC_IP" = "$EXPECTED_HOST_IP"
            echo "Before deploy SHA: $(git rev-parse --short HEAD)"

            git fetch --prune origin main
            git checkout main
            git reset --hard "$TARGET_SHA"
            git clean -fd -e '.env*'
            echo "After reset SHA: $(git rev-parse --short HEAD)"

            pkill -f "next build" || true
            pnpm install --no-frozen-lockfile
            export NODE_OPTIONS=--max-old-space-size=2048
            printf "%s" "$TARGET_SHA" > public/deploy-sha.txt
            pnpm build --webpack
            test -f .next/BUILD_ID

            pm2 delete portfolio || true
            pm2 start "pnpm start -p 3000" --name portfolio --cwd /var/www/portfolio

            pm2 save
            curl -fsS http://127.0.0.1:3000 >/dev/null
            LOCAL_SHA="$(curl -fsS http://127.0.0.1:3000/deploy-sha.txt | tr -d '\r\n')"
            echo "Local served SHA: $LOCAL_SHA"
            test "$LOCAL_SHA" = "$TARGET_SHA"
            NGINX_SHA="$(curl -fsS --resolve "rossolovedesign.ru:443:127.0.0.1" https://rossolovedesign.ru/deploy-sha.txt | tr -d '\r\n')"
            echo "Nginx served SHA: $NGINX_SHA"
            test "$NGINX_SHA" = "$TARGET_SHA"
            DEPLOYED_SHA="$(git rev-parse HEAD)"
            echo "Deployed SHA: $DEPLOYED_SHA"
            test "$DEPLOYED_SHA" = "$TARGET_SHA"
